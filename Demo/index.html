<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Terraform Deployed Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    
    <h1>🚀 Infrastructure is Live</h1>
    <p class="subtitle">Your Terraform deployment is working perfectly.</p>

    <div class="status">
      <div class="card">
        <h2>🌐 Public Server</h2>
        <p>Status: <span class="online">ONLINE</span></p>
      </div>

      <div class="card">
        <h2>🔐 Private Server</h2>
        <p>Status: <span class="online">REACHABLE</span></p>
      </div>

      <div class="card">
        <h2>⚙️ Automation</h2>
        <p>Provisioned with Terraform</p>
      </div>
    </div>

    <p class="footer-text">✨ Have a pleasant start of the week ✨</p>

  </div>

</body>
</html>
